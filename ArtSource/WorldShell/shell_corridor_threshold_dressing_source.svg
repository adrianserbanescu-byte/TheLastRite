<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="26" y="26" width="1548" height="928" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Shell Corridor Threshold Dressing</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Surrounding-space dressing family for the corridor and threshold around Apartment 302</text>
  <rect x="82" y="176" width="480" height="720" rx="24" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <rect x="118" y="216" width="408" height="140" rx="18" fill="#24211d" stroke="#687770" stroke-width="2"/>
  <text x="150" y="298" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">intake corridor</text>
  <rect x="118" y="404" width="408" height="220" rx="18" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="150" y="468" fill="#cfc7b7" font-family="Arial, Helvetica, sans-serif" font-size="24">notice board</text>
  <text x="150" y="506" fill="#cfc7b7" font-family="Arial, Helvetica, sans-serif" font-size="24">ward placard</text>
  <text x="150" y="544" fill="#cfc7b7" font-family="Arial, Helvetica, sans-serif" font-size="24">door index</text>
  <text x="118" y="702" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Use stable institutional props and low-key wear.</text>
  <rect x="606" y="176" width="912" height="720" rx="24" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="642" y="234" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Dressing Notes</text>
  <text x="642" y="288" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Wanted read:</text>
  <text x="642" y="320" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">municipal, low-budget, procedural, slightly uncanny</text>
  <text x="642" y="376" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Keep stronger than:</text>
  <text x="642" y="408" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">blank generic hallway space</text>
  <text x="642" y="436" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">unreadable neutral signage</text>
  <text x="642" y="492" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Keep calmer than:</text>
  <text x="642" y="524" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">the apartment interior</text>
  <text x="642" y="552" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">full occult spectacle</text>
  <text x="642" y="580" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">grime-first horror dressing</text>
  <rect x="642" y="658" width="810" height="120" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="676" y="730" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="24">The threshold should prepare the player for case entry, not try to out-haunt the apartment.</text>
</svg>
