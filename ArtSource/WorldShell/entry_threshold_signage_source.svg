<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="26" y="26" width="1548" height="928" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Entry Threshold Signage</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Primary shell-to-case approach marker for Apartment 302</text>
  <rect x="86" y="176" width="640" height="700" rx="28" fill="#21201b" stroke="#687770" stroke-width="2"/>
  <rect x="130" y="220" width="552" height="270" rx="24" fill="#2a2722" stroke="#968347" stroke-width="3"/>
  <text x="192" y="320" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" letter-spacing="3">CASE ACCESS</text>
  <text x="192" y="390" fill="#d1bb79" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" letter-spacing="6">302</text>
  <text x="194" y="454" fill="#c7bfaf" font-family="Arial, Helvetica, sans-serif" font-size="24">Authorized ritual team only</text>
  <rect x="130" y="542" width="552" height="110" rx="18" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="164" y="608" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">follow intake corridor to active case</text>
  <text x="130" y="728" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="19">Read target: one strong room number, one clear access state,</text>
  <text x="130" y="758" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="19">and one calm routing message before the player hits the apartment door.</text>
  <rect x="770" y="176" width="744" height="700" rx="28" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="806" y="234" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Threshold Notes</text>
  <text x="806" y="288" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Use for:</text>
  <text x="806" y="320" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">entry signage outside the apartment</text>
  <text x="806" y="348" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">case-active threshold markers</text>
  <text x="806" y="404" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Avoid:</text>
  <text x="806" y="436" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">full occult symbols at the threshold</text>
  <text x="806" y="464" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">apartment-clue ornament copied into hallway signage</text>
  <text x="806" y="492" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">grimy horror clutter that kills wayfinding</text>
  <rect x="806" y="580" width="648" height="112" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="838" y="648" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="24">The shell threshold should feel procedural first, uncanny second.</text>
</svg>
