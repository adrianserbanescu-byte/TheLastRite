  <text x="1054" y="276" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Briefing Notes</text>
  <text x="1054" y="324" fill="#38332d" font-family="Arial, Helvetica, sans-serif" font-size="20">Paper-first and procedural.</text>
  <text x="1054" y="360" fill="#38332d" font-family="Arial, Helvetica, sans-serif" font-size="20">No fake-horror distortion around live text.</text>
  <text x="1054" y="396" fill="#38332d" font-family="Arial, Helvetica, sans-serif" font-size="20">The shell frames the room without solving it.</text>
