  <text x="156" y="164" fill="#efe7d3" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">CASE BRIEFING // APARTMENT 302</text>
  <rect x="126" y="224" width="408" height="520" rx="18" fill="#f1eadb" stroke="#c0aa66" stroke-width="2"/>
  <text x="156" y="276" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Objective</text>
  <text x="156" y="324" fill="#38332d" font-family="Arial, Helvetica, sans-serif" font-size="20">1. Inspect clustered evidence.</text>
  <text x="156" y="360" fill="#38332d" font-family="Arial, Helvetica, sans-serif" font-size="20">2. Reject the loudest bait path.</text>
  <text x="156" y="396" fill="#38332d" font-family="Arial, Helvetica, sans-serif" font-size="20">3. Prepare the correct anchor.</text>
  <text x="156" y="432" fill="#38332d" font-family="Arial, Helvetica, sans-serif" font-size="20">4. Complete the rite cleanly.</text>
  <rect x="570" y="224" width="418" height="520" rx="18" fill="#f1eadb" stroke="#75837d" stroke-width="2"/>
