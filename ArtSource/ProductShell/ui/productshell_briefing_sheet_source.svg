  <text x="626" y="506" fill="#33302a" font-family="Arial, Helvetica, sans-serif" font-size="21">censer // stabilize pressure</text>
  <text x="626" y="584" fill="#33302a" font-family="Arial, Helvetica, sans-serif" font-size="21">guard // protect the sequence</text>
