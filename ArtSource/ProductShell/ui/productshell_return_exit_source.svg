<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Return To Title + Exit Source</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Shell surface for return-to-title and exit-confirmation framing without drifting into runtime proof</text>

  <rect x="64" y="166" width="1470" height="100" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="100" y="228" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">RETURN TO TITLE / EXIT CONFIRMATION</text>
  <text x="1044" y="228" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Quiet shell framing for ending the current session path</text>

  <rect x="64" y="304" width="520" height="602" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="98" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Exit Summary</text>
  <rect x="98" y="396" width="452" height="170" rx="20" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="132" y="454" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">return to title or close now</text>
  <text x="132" y="496" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Use one short exit note and one visible distinction between returning to the shell title layer and leaving the application entirely.</text>
  <rect x="98" y="616" width="166" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="286" y="616" width="166" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <rect x="474" y="616" width="76" height="60" rx="30" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="126" y="654" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">title</text>
  <text x="330" y="654" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">exit</text>
  <text x="500" y="654" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">i</text>
  <text x="98" y="748" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="20">The shell should keep the final choice clean and unsurprising.</text>

  <rect x="620" y="304" width="410" height="602" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="654" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Exit Rows</text>
  <rect x="654" y="396" width="342" height="76" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="654" y="490" width="342" height="76" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <rect x="654" y="584" width="342" height="76" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <text x="682" y="442" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">return to shell title</text>
  <text x="682" y="536" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">leave current party</text>
  <text x="682" y="630" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">close application</text>
  <rect x="808" y="718" width="188" height="56" rx="28" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="854" y="753" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">continue</text>

  <rect x="1066" y="304" width="468" height="602" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1100" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1100" y="424" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">This surface should make ending or backing out feel orderly, not ominous.</text>
  <text x="1100" y="466" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Use short route labels and one clear distinction between title return and full exit.</text>
  <text x="1100" y="502" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not treat this as proof of save timing, process shutdown, or session teardown logic.</text>
  <text x="1100" y="538" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">The shell should preserve confidence while the player leaves the current path.</text>
  <rect x="1100" y="620" width="372" height="74" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1128" y="666" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">return-or-exit banner</text>
  <rect x="1100" y="724" width="372" height="74" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1128" y="770" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">title-and-exit strip</text>
</svg>
