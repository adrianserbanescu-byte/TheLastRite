<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Update Required + Incompatible Session Source</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Shell carry-forward for update-required notice, incompatible-session framing, and one stable exit path</text>

  <rect x="64" y="166" width="1470" height="104" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="98" y="230" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">UPDATE REQUIRED / SESSION NOT COMPATIBLE</text>
  <text x="1030" y="230" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Use direct update language when the shell cannot safely rejoin the current session state</text>

  <rect x="64" y="306" width="544" height="604" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="98" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Update Notice</text>
  <rect x="98" y="398" width="476" height="186" rx="20" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="132" y="454" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">this session needs a newer build</text>
  <text x="132" y="496" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Frame the gate as a required compatibility update. Make the block readable, then show one clean route toward updating or returning to stable shell space.</text>
  <rect x="98" y="626" width="220" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="340" y="626" width="220" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="148" y="664" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">update now</text>
  <text x="392" y="664" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">back later</text>
  <rect x="98" y="738" width="476" height="92" rx="18" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="126" y="794" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">compatible build required / session closed</text>

  <rect x="642" y="306" width="386" height="604" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="676" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Action Ladder</text>
  <rect x="676" y="398" width="318" height="74" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <rect x="676" y="490" width="318" height="74" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="676" y="582" width="318" height="74" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <text x="704" y="444" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">download update</text>
  <text x="704" y="536" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">session no longer compatible</text>
  <text x="704" y="628" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">return to title</text>
  <rect x="790" y="732" width="204" height="56" rx="28" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="842" y="767" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">update</text>

  <rect x="1062" y="306" width="472" height="604" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1096" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1096" y="426" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">Update-required language should feel firm and administrative, not panicked or shaming.</text>
  <text x="1096" y="468" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not imply final patch transport, store behavior, or platform-specific update rules.</text>
  <text x="1096" y="504" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep incompatible-session framing clear so the player knows the current room cannot reopen until versions align.</text>
  <rect x="1096" y="592" width="372" height="78" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1124" y="640" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">update required banner</text>
  <rect x="1096" y="700" width="372" height="78" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1124" y="748" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">incompatible-session card</text>
  <rect x="1096" y="810" width="220" height="54" rx="27" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="1144" y="844" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">required</text>
</svg>
