<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Launch Confirmation Source</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Pre-case shell surface for final launch confirmation, readiness summary, and restrained transition into the Apartment 302 handoff</text>

  <rect x="64" y="166" width="1470" height="100" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="100" y="228" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">LAUNCH CONFIRMATION / CASE HANDOFF</text>
  <text x="1110" y="228" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Final pre-case shell read</text>

  <rect x="64" y="304" width="520" height="602" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="98" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Ready Summary</text>
  <rect x="98" y="396" width="452" height="170" rx="20" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="132" y="456" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">team aligned // launch clear</text>
  <text x="132" y="498" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Four roles synced, correct locus confirmed, false path rejected, fallback acknowledged.</text>
  <rect x="98" y="614" width="210" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="340" y="614" width="210" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="154" y="652" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">launch</text>
  <text x="396" y="652" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">hold</text>
  <text x="98" y="754" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="20">Keep the final choice simple: go now or review once more.</text>

  <rect x="620" y="304" width="410" height="602" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="654" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Pre-Case Checks</text>
  <rect x="654" y="396" width="342" height="74" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="654" y="490" width="342" height="74" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="654" y="584" width="342" height="74" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <text x="682" y="442" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">entry route clean</text>
  <text x="682" y="536" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">tool issue complete</text>
  <text x="682" y="630" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">ritual anchor agreed</text>
  <rect x="808" y="718" width="188" height="56" rx="28" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="856" y="753" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">ready</text>

  <rect x="1066" y="304" width="468" height="602" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1100" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1100" y="424" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">This surface should feel like a final administrative nod, not a spectacle countdown.</text>
  <text x="1100" y="466" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Use one clear summary card, one short check list, and one launch action.</text>
  <text x="1100" y="502" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not treat this as proof of runtime timing, matchmaking, or loading behavior.</text>
  <text x="1100" y="538" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">The shell hands off to the case; it should not become the dramatic centerpiece.</text>
  <rect x="1100" y="620" width="372" height="74" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1128" y="666" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">launch confirmation banner</text>
  <rect x="1100" y="724" width="372" height="74" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1128" y="770" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">pre-case checklist row</text>
</svg>
