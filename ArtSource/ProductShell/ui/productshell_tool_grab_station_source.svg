  <rect x="336" y="524" width="118" height="38" rx="19" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <rect x="336" y="632" width="118" height="38" rx="19" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="336" y="740" width="118" height="38" rx="19" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="364" y="442" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">issued</text>
  <text x="366" y="550" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">hold</text>
  <text x="364" y="658" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">issued</text>
  <text x="364" y="766" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">issued</text>

  <rect x="556" y="304" width="500" height="596" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="590" y="356" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Primary Tray</text>
  <rect x="590" y="394" width="432" height="178" rx="20" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="624" y="456" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">reader pack</text>
  <text x="624" y="496" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Paper-first bundle with one loud label and one calm readiness note.</text>
  <rect x="590" y="610" width="204" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="818" y="610" width="204" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="650" y="648" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">equipped</text>
  <text x="885" y="648" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">swap</text>
  <rect x="590" y="708" width="432" height="132" rx="18" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <text x="620" y="760" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Read order</text>
  <text x="620" y="796" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="18">Case identity first, tool family second, warnings last.</text>
  <text x="620" y="826" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not turn this station into a dense inventory spreadsheet.</text>

  <rect x="1092" y="304" width="440" height="596" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1126" y="356" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1126" y="420" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">Keep tool-grab readable at a glance before any runtime inventory logic exists.</text>
  <text x="1126" y="474" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Emphasize issue state, role relevance, and one clear swap action.</text>
  <text x="1126" y="510" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Treat tray art as ceremonial administration, not loot drama.</text>
  <text x="1126" y="546" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">This remains source-art guidance only, not controller mapping proof.</text>
  <rect x="1126" y="604" width="372" height="74" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1152" y="650" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">tool family label</text>
  <rect x="1126" y="710" width="372" height="74" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1152" y="756" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">readiness warning strip</text>
 </svg>
