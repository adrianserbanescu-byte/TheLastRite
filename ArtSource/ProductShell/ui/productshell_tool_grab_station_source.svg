  <text x="124" y="554" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">salt strip</text>
  <text x="124" y="662" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">iron nails</text>
  <text x="124" y="770" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">monitor tape</text>
