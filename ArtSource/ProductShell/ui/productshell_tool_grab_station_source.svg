  <text x="1034" y="228" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Apartment 302 shell wrapper for tool-grab clarity</text>

  <rect x="64" y="304" width="456" height="596" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="98" y="356" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Issue Slots</text>
