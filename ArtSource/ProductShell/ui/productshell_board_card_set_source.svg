<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Board Card Source Set</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Core board-card treatments for case selection, role readiness, and run-state visibility</text>

  <rect x="70" y="170" width="420" height="680" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="104" y="222" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Case Card</text>
  <rect x="104" y="252" width="352" height="216" rx="18" fill="#ece4d2" stroke="#a7904f" stroke-width="2"/>
  <text x="132" y="316" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Apartment 302</text>
  <text x="132" y="360" fill="#3a342d" font-family="Arial, Helvetica, sans-serif" font-size="20">Hollow Saint // casefile active</text>
  <rect x="132" y="392" width="152" height="44" rx="22" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="167" y="420" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">available</text>
  <text x="104" y="516" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Read target:</text>
  <text x="104" y="548" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Room identity, demon label, and state chips</text>
  <text x="104" y="576" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">should scan before ornament or flavor notes.</text>

  <rect x="540" y="170" width="420" height="680" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="574" y="222" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Role Card</text>
  <rect x="574" y="252" width="352" height="216" rx="18" fill="#22201b" stroke="#687770" stroke-width="2"/>
  <text x="602" y="316" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Reader</text>
  <text x="602" y="360" fill="#cfc7b7" font-family="Arial, Helvetica, sans-serif" font-size="20">interpret the pattern</text>
  <rect x="602" y="392" width="136" height="44" rx="22" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="634" y="420" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">locked in</text>
  <text x="574" y="516" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Read target:</text>
  <text x="574" y="548" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Role name, function, and readiness chip</text>
  <text x="574" y="576" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">must stay legible from stream distance.</text>

  <rect x="1010" y="170" width="520" height="680" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1044" y="222" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Board Notes</text>
  <text x="1044" y="278" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Use cards to separate:</text>
  <text x="1044" y="310" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">case identity</text>
  <text x="1044" y="338" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">role identity</text>
  <text x="1044" y="366" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">state / readiness</text>
  <text x="1044" y="422" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Avoid:</text>
  <text x="1044" y="454" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">small over-nested status labels</text>
  <text x="1044" y="482" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">diegetic clue art inside shell cards</text>
  <text x="1044" y="510" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">fake layout precision claims</text>
  <rect x="1044" y="590" width="430" height="92" rx="18" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1074" y="646" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="22">Source-art-only card system for later implementation carry-forward.</text>
</svg>
