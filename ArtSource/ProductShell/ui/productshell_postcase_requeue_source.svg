<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#0D1111"/>
  <rect x="28" y="28" width="1544" height="924" rx="24" fill="#141B1B" stroke="#8A7A52" stroke-width="2"/>
  <rect x="56" y="56" width="1488" height="110" rx="16" fill="#192121" stroke="#8A7A52" stroke-width="2"/>
  <text x="86" y="96" fill="#C9C2AE" font-family="Arial" font-size="22" letter-spacing="5">POST-CASE REQUEUE SOURCE</text>
  <text x="86" y="138" fill="#F2E7BF" font-family="Arial" font-size="38" font-weight="700" letter-spacing="2">QUEUE NEXT CASE // POST-CASE ROUTING</text>
  <text x="1240" y="96" fill="#9FA89A" font-family="Arial" font-size="18" letter-spacing="3">CALM NEXT STEP</text>
  <rect x="84" y="198" width="468" height="672" rx="22" fill="#171F1F" stroke="#8A7A52" stroke-width="2"/>
  <rect x="580" y="198" width="468" height="672" rx="22" fill="#171F1F" stroke="#6D7E70" stroke-width="2"/>
  <rect x="1076" y="198" width="408" height="672" rx="22" fill="#171F1F" stroke="#6D7E70" stroke-width="2"/>
  <text x="116" y="246" fill="#E9D8A6" font-family="Arial" font-size="22" letter-spacing="4">ROUTE SUMMARY</text>
  <text x="116" y="300" fill="#F5F2E8" font-family="Arial" font-size="48" font-weight="700">Next case is offered, not pushed</text>
  <text x="116" y="346" fill="#AAB4A5" font-family="Arial" font-size="22">Requeue should feel like administrative routing after the debrief settles.</text>
  <rect x="116" y="390" width="404" height="130" rx="14" fill="#202929" stroke="#8A7A52"/>
  <text x="144" y="432" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">READY STATE</text>
  <text x="144" y="476" fill="#F5F2E8" font-family="Arial" font-size="32" font-weight="700">Post-case path available</text>
  <rect x="116" y="548" width="404" height="130" rx="14" fill="#202929" stroke="#6D7E70"/>
  <text x="144" y="590" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">NEXT ACTION</text>
  <text x="144" y="634" fill="#F5F2E8" font-family="Arial" font-size="32" font-weight="700">Queue with notes retained</text>
  <rect x="116" y="706" width="404" height="116" rx="14" fill="#202929" stroke="#6D7E70"/>
  <text x="144" y="748" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">PAIRING</text>
  <text x="144" y="790" fill="#D5DCCF" font-family="Arial" font-size="28">Result, debrief, replay, then requeue.</text>
  <text x="612" y="246" fill="#E9D8A6" font-family="Arial" font-size="22" letter-spacing="4">ROUTE ROWS</text>
  <rect x="612" y="286" width="404" height="112" rx="14" fill="#202929" stroke="#8A7A52"/>
  <text x="640" y="328" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">ROW 01</text>
  <text x="640" y="370" fill="#F5F2E8" font-family="Arial" font-size="30" font-weight="700">Queue same party</text>
  <rect x="612" y="422" width="404" height="112" rx="14" fill="#202929" stroke="#6D7E70"/>
  <text x="640" y="464" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">ROW 02</text>
  <text x="640" y="506" fill="#F5F2E8" font-family="Arial" font-size="30" font-weight="700">Queue after review hold</text>
  <rect x="612" y="558" width="404" height="112" rx="14" fill="#202929" stroke="#6D7E70"/>
  <text x="640" y="600" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">ROW 03</text>
  <text x="640" y="642" fill="#F5F2E8" font-family="Arial" font-size="30" font-weight="700">Return to case board</text>
  <rect x="612" y="694" width="404" height="128" rx="14" fill="#202929" stroke="#6D7E70"/>
  <text x="640" y="736" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">NOTE</text>
  <text x="640" y="778" fill="#D5DCCF" font-family="Arial" font-size="28">No live-service urgency, only calm routing clarity.</text>
  <text x="1108" y="246" fill="#E9D8A6" font-family="Arial" font-size="22" letter-spacing="4">BOUNDARY NOTES</text>
  <rect x="1108" y="286" width="344" height="160" rx="14" fill="#202929" stroke="#8A7A52"/>
  <text x="1136" y="330" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">KEEP</text>
  <text x="1136" y="372" fill="#D5DCCF" font-family="Arial" font-size="26">Queue language orderly, paper-like, and deliberate.</text>
  <rect x="1108" y="470" width="344" height="160" rx="14" fill="#202929" stroke="#6D7E70"/>
  <text x="1136" y="514" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">AVOID</text>
  <text x="1136" y="556" fill="#D5DCCF" font-family="Arial" font-size="26">Claims about queue persistence, party lock, or final runtime timings.</text>
  <rect x="1108" y="654" width="344" height="168" rx="14" fill="#202929" stroke="#6D7E70"/>
  <text x="1136" y="698" fill="#C6D0C2" font-family="Arial" font-size="18" letter-spacing="3">PAIR WITH</text>
  <text x="1136" y="742" fill="#F5F2E8" font-family="Arial" font-size="30" font-weight="700">Shared post-case route components</text>
</svg>
