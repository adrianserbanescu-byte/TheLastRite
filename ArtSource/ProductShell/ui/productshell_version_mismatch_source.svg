<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Version Mismatch Source</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Shell carry-forward for version mismatch, readable compatibility notices, and one calm path toward alignment</text>

  <rect x="64" y="166" width="1470" height="104" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="98" y="230" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">VERSION MISMATCH / SESSION OUT OF STEP</text>
  <text x="1042" y="230" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Make the difference legible without turning the shell into a technical fault wall</text>

  <rect x="64" y="308" width="520" height="598" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="98" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Compatibility Summary</text>
  <rect x="98" y="398" width="452" height="176" rx="20" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="132" y="456" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">this session uses a different build</text>
  <text x="132" y="498" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Use one plain mismatch sentence, one short alignment note, and one visible next step that keeps the player inside a readable shell loop.</text>
  <rect x="98" y="622" width="198" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="318" y="622" width="198" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="140" y="660" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">update</text>
  <text x="364" y="660" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">later</text>
  <text x="98" y="748" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="20">Keep the shell instructional and composed instead of punitive.</text>

  <rect x="620" y="308" width="408" height="598" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="654" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Mismatch Rows</text>
  <rect x="654" y="398" width="340" height="78" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="654" y="494" width="340" height="78" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <rect x="654" y="590" width="340" height="78" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <text x="682" y="446" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">session version differs</text>
  <text x="682" y="542" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">align build to join</text>
  <text x="682" y="638" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">return to stable shell</text>
  <rect x="774" y="730" width="220" height="56" rx="28" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="836" y="765" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">review</text>

  <rect x="1066" y="308" width="468" height="598" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1100" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1100" y="426" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">Version-mismatch language should feel like compatibility guidance, not player blame.</text>
  <text x="1100" y="468" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not imply final patch rules, deployment cadence, or platform-level entitlement behavior.</text>
  <text x="1100" y="504" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep one alignment path primary so the player can understand the mismatch quickly and leave with orientation intact.</text>
  <rect x="1100" y="586" width="370" height="78" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1128" y="634" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">version mismatch banner</text>
  <rect x="1100" y="694" width="370" height="78" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1128" y="742" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">alignment strip</text>
  <rect x="1100" y="802" width="198" height="54" rx="27" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="1140" y="836" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">review</text>
</svg>
