<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Unavailable Service + Retry Later Source</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Shell carry-forward for unavailable-service notice, planned retry windows, and calm fallback routing</text>

  <rect x="64" y="166" width="1470" height="104" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="98" y="230" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">SERVICE UNAVAILABLE / TRY AGAIN LATER</text>
  <text x="1058" y="230" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Use scheduled, report-like language when the shell cannot reopen the current service path yet</text>

  <rect x="64" y="306" width="544" height="604" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="98" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Service Notice</text>
  <rect x="98" y="398" width="476" height="186" rx="20" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="132" y="454" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">service path unavailable for now</text>
  <text x="132" y="496" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Frame the outage as a temporary administrative hold. Offer one retry-later cue and one alternate route back to stable shell space.</text>
  <rect x="98" y="626" width="220" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <rect x="340" y="626" width="220" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="136" y="664" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">retry later</text>
  <text x="396" y="664" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">back to shell</text>
  <rect x="98" y="738" width="476" height="92" rx="18" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="126" y="794" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">next retry window / advisory note</text>

  <rect x="642" y="306" width="386" height="604" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="676" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Retry Ladder</text>
  <rect x="676" y="398" width="318" height="74" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <rect x="676" y="490" width="318" height="74" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="676" y="582" width="318" height="74" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <text x="704" y="444" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">automatic retry hold</text>
  <text x="704" y="536" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">notify when ready</text>
  <text x="704" y="628" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">return to title</text>
  <rect x="806" y="732" width="188" height="56" rx="28" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="844" y="767" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">later</text>

  <rect x="1062" y="306" width="472" height="604" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1096" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1096" y="426" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">Unavailable-service language should read like a deferred municipal process, not a crash screen.</text>
  <text x="1096" y="468" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not promise queue timing, notification delivery, or backend repair cadence.</text>
  <text x="1096" y="504" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep retry-later visible as a pacing tool, not as a disguised failure state or dead end.</text>
  <rect x="1096" y="592" width="372" height="78" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1124" y="640" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">unavailable service banner</text>
  <rect x="1096" y="700" width="372" height="78" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1124" y="748" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">scheduled retry card</text>
  <rect x="1096" y="810" width="220" height="54" rx="27" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="1150" y="844" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">stable</text>
</svg>
