<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Transition State Source Set</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Inter-round and between-surface state treatments for shell carry-forward work</text>

  <rect x="70" y="168" width="460" height="692" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="104" y="220" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Loading / Handoff</text>
  <rect x="104" y="258" width="392" height="110" rx="18" fill="#24211d" stroke="#968347" stroke-width="2"/>
  <text x="136" y="323" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">preparing casefile</text>
  <rect x="104" y="404" width="392" height="28" rx="14" fill="#2a2722"/>
  <rect x="104" y="404" width="248" height="28" rx="14" fill="#d2bc7b"/>
  <text x="104" y="492" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Use calm progress and one clear message.</text>

  <rect x="570" y="168" width="460" height="692" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="604" y="220" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Commit / Locked In</text>
  <rect x="604" y="258" width="392" height="110" rx="18" fill="#24211d" stroke="#687770" stroke-width="2"/>
  <text x="636" y="323" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">team ready</text>
  <rect x="636" y="404" width="178" height="52" rx="26" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="686" y="438" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">locked</text>
  <text x="604" y="492" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Signal commitment without action-game excitement.</text>

  <rect x="1070" y="168" width="460" height="692" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="1104" y="220" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Failure / Retry</text>
  <rect x="1104" y="258" width="392" height="110" rx="18" fill="#24211d" stroke="#968347" stroke-width="2"/>
  <text x="1136" y="323" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">ritual failed</text>
  <rect x="1136" y="404" width="178" height="52" rx="26" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="1182" y="438" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">retry</text>
  <text x="1104" y="492" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Even failure states should stay legible and report-like.</text>
</svg>
