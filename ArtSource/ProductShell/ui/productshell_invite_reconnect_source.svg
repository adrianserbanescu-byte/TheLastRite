<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Invite + Reconnect Notice Source</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Session shell surface for invite/join language and reconnect-notice framing without drifting into runtime proof</text>

  <rect x="64" y="166" width="1470" height="100" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="100" y="228" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">INVITE / JOIN / RECONNECT NOTICE</text>
  <text x="1082" y="228" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Quiet support for party changes and return-to-session flow</text>

  <rect x="64" y="304" width="520" height="602" rx="22" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="98" y="360" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Invite Notice</text>
  <rect x="98" y="396" width="452" height="170" rx="20" fill="#f2ebdc" stroke="#75837d" stroke-width="2"/>
  <text x="132" y="454" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">slot reserved for censer</text>
  <text x="132" y="496" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Use one short invitation note and one clear join path. The shell should help the player understand who is expected without exposing backend mechanics.</text>
  <rect x="98" y="616" width="168" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="288" y="616" width="168" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <rect x="478" y="616" width="72" height="60" rx="30" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="148" y="654" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">join</text>
  <text x="328" y="654" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">later</text>
  <text x="504" y="654" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">x</text>

  <rect x="620" y="304" width="410" height="602" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="654" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Reconnect Rows</text>
  <rect x="654" y="396" width="342" height="76" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="654" y="490" width="342" height="76" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <rect x="654" y="584" width="342" height="76" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <text x="682" y="442" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">return to party state</text>
  <text x="682" y="536" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">resume last clear shell</text>
  <text x="682" y="630" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">open help note</text>
  <rect x="804" y="718" width="192" height="56" rx="28" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="850" y="753" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">return</text>

  <rect x="1066" y="304" width="468" height="602" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1100" y="360" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1100" y="424" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">This surface should frame party changes as calm session maintenance.</text>
  <text x="1100" y="466" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Use short invite copy, one join choice, and one reconnect path.</text>
  <text x="1100" y="502" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not treat this as proof of invite transport, presence syncing, or reconnect logic.</text>
  <text x="1100" y="538" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">The shell should re-establish clarity, not dramatize technical state changes.</text>
  <rect x="1100" y="620" width="372" height="74" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1128" y="666" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">invite and reconnect banner</text>
  <rect x="1100" y="724" width="372" height="74" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1128" y="770" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">return-to-party strip</text>
</svg>
