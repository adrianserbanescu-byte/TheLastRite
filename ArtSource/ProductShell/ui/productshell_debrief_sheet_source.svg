  <text x="1104" y="462" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">next case</text>
  <rect x="1266" y="424" width="194" height="58" rx="29" fill="#29332f" stroke="#63726c" stroke-width="2"/>
  <text x="1320" y="462" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">replay</text>
  <text x="1050" y="528" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">The replay prompt should sit in the shell layer,</text>
  <text x="1050" y="556" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">but it should not drown out the story beat that just landed.</text>
