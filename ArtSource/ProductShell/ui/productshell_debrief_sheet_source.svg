  <text x="138" y="386" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Evidence Chain</text>
  <text x="138" y="434" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="20">Nursery route corroborated.</text>
  <text x="138" y="468" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Mirror bait rejected before anchor commit.</text>
  <text x="138" y="502" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Clue hierarchy remained readable.</text>
  <rect x="562" y="334" width="420" height="442" rx="20" fill="#22201b" stroke="#63726c" stroke-width="2"/>
  <text x="594" y="386" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Ritual Verdict</text>
  <rect x="594" y="420" width="356" height="62" rx="31" fill="#2b342f" stroke="#63726c" stroke-width="2"/>
  <text x="673" y="460" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">seal stable</text>
  <text x="594" y="528" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Debrief should summarize outcome cleanly,</text>
  <text x="594" y="556" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">not celebrate like an arcade result screen.</text>
  <rect x="1018" y="334" width="476" height="442" rx="20" fill="#22201b" stroke="#978347" stroke-width="2"/>
  <text x="1050" y="386" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Replay Hand-off</text>
