<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Queue Position + Restoration Source</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Shell carry-forward for queue position, service restoration progress, and calm reentry framing</text>

  <rect x="64" y="166" width="1470" height="104" rx="20" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="98" y="230" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">QUEUE POSITION / SERVICE RETURNING</text>
  <text x="1054" y="230" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">Use measured restoration language while the shell manages orderly return</text>

  <rect x="64" y="306" width="544" height="604" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="98" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Queue Notice</text>
  <rect x="98" y="398" width="476" height="186" rx="20" fill="#e8e0cd" stroke="#a28d4e" stroke-width="2"/>
  <text x="132" y="454" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">service is reopening in order</text>
  <text x="132" y="496" fill="#3b352f" font-family="Arial, Helvetica, sans-serif" font-size="20">Frame queue position as orderly return rather than competitive waiting. Show one status band, one restoration cue, and one stable backout path.</text>
  <rect x="98" y="626" width="220" height="60" rx="30" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <rect x="340" y="626" width="220" height="60" rx="30" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="148" y="664" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">hold place</text>
  <text x="392" y="664" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">leave queue</text>
  <rect x="98" y="738" width="476" height="92" rx="18" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="126" y="794" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">queue status / restoration advisory</text>

  <rect x="642" y="306" width="386" height="604" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="676" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Restoration Ladder</text>
  <rect x="676" y="398" width="318" height="74" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <rect x="676" y="490" width="318" height="74" rx="16" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <rect x="676" y="582" width="318" height="74" rx="16" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <text x="704" y="444" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">queue position confirmed</text>
  <text x="704" y="536" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">service returning</text>
  <text x="704" y="628" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">rejoin when ready</text>
  <rect x="790" y="732" width="204" height="56" rx="28" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="848" y="767" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">wait</text>

  <rect x="1062" y="306" width="472" height="604" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1096" y="362" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Boundary Notes</text>
  <text x="1096" y="426" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="21">Queue-position language should feel orderly and civic, not competitive or punitive.</text>
  <text x="1096" y="468" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not imply final queue math, reservation guarantees, or live restoration timing.</text>
  <text x="1096" y="504" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep restoration status calm so the player understands service is returning without treating it as proof of immediate access.</text>
  <rect x="1096" y="592" width="372" height="78" rx="16" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <text x="1124" y="640" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">queue status banner</text>
  <rect x="1096" y="700" width="372" height="78" rx="16" fill="#23211d" stroke="#968347" stroke-width="2"/>
  <text x="1124" y="748" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">restoration progress card</text>
  <rect x="1096" y="810" width="220" height="54" rx="27" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="1142" y="844" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">restoring</text>
</svg>
