  <text x="96" y="828" fill="#D5DCCF" font-family="Arial" font-size="26">This board groups accepted post-case source art for carry-forward only. It does not prove replay logic, requeue persistence, controller navigation, final widget sizing, or Unreal runtime implementation.</text>
