  <text x="98" y="744" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="20">Target read: planned downtime with one stable fallback while the service window remains closed.</text>
  <text x="98" y="782" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">File: ui/productshell_maintenance_window_source.svg</text>

