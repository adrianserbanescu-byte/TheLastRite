<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="24" y="24" width="1552" height="932" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">GP-A9 Permissions + Handoff Board</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Browse-first board for the ninth ProductShell source-art carry-forward pass</text>

  <rect x="64" y="166" width="460" height="712" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="96" y="218" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">productshell_session_permissions_source.svg</text>
  <rect x="96" y="250" width="392" height="170" rx="18" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <text x="126" y="320" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">permissions</text>
  <text x="126" y="358" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="18">bounded shell surface for privacy state and who may act or join</text>
  <text x="96" y="486" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="20">Use when later shell work needs access rules to read quickly and calmly.</text>
  <text x="96" y="522" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep permission language shorter than the explanatory note around it.</text>

  <rect x="570" y="166" width="460" height="712" rx="22" fill="#1f1d19" stroke="#687770" stroke-width="2"/>
  <text x="602" y="218" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">productshell_host_handoff_source.svg</text>
  <rect x="602" y="250" width="392" height="170" rx="18" fill="#25221e" stroke="#968347" stroke-width="2"/>
  <text x="630" y="320" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">host handoff</text>
  <text x="630" y="358" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="18">bounded shell surface for transferring control and preserving privacy state clarity</text>
  <text x="602" y="486" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="20">Use when later shell work needs a visible but quiet host-transfer path.</text>
  <text x="602" y="522" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep the transfer language human and administrative rather than alarming.</text>

  <rect x="1076" y="166" width="460" height="712" rx="22" fill="#1f1d19" stroke="#968347" stroke-width="2"/>
  <text x="1108" y="218" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">sharedui_shell_permissions_handoff_components.svg</text>
  <rect x="1108" y="250" width="392" height="170" rx="18" fill="#25221e" stroke="#687770" stroke-width="2"/>
  <text x="1136" y="320" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">shared pieces</text>
  <text x="1136" y="358" fill="#d6cfbf" font-family="Arial, Helvetica, sans-serif" font-size="18">support sheet for permission rows, privacy tags, host-transfer banners, and confirmation cards</text>
  <text x="1108" y="486" fill="#d7d0c0" font-family="Arial, Helvetica, sans-serif" font-size="20">Use as the component companion to the two new GP-A9 shell surfaces.</text>
  <text x="1108" y="522" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Do not treat the sheet as a final widget library or runtime proof.</text>
</svg>
