  <text x="796" y="248" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Export name</text>
  <text x="796" y="286" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">apt302_nursery_sigil_correct_ritual_2048.png</text>
  <text x="796" y="352" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Suggested size</text>
  <text x="796" y="390" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">2048 x 2048 transparent or dark-field source</text>
  <text x="796" y="456" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Opacity guidance</text>
  <text x="796" y="494" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Keep runtime opacity around 0.72-0.88 so chalk breakup survives.</text>
  <text x="796" y="560" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Usage note</text>
  <text x="796" y="598" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Use as floor decal or projected mark in the nursery only.</text>
  <text x="796" y="636" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Do not sharpen it into a clean symbol that loses ash-dry edges.</text>
