<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#171612"/>
  <rect x="60" y="60" width="1280" height="780" rx="24" fill="#11120f" stroke="#8f9087" stroke-width="4"/>
  <text x="96" y="118" font-family="Georgia, serif" font-size="40" fill="#f4efdc">Export spec: Hollow Saint ritual-status overlay</text>
  <text x="96" y="158" font-family="Arial, sans-serif" font-size="22" fill="#c9c0a3">PNG-ready reference card for top-and-bottom HUD support art.</text>
  <rect x="96" y="206" width="664" height="538" rx="18" fill="#171612"/>
  <rect x="96" y="206" width="664" height="118" rx="18" fill="#11120f" opacity="0.84" stroke="#a98f45" stroke-width="3"/>
  <rect x="96" y="628" width="664" height="116" rx="18" fill="#11120f" opacity="0.86" stroke="#a98f45" stroke-width="3"/>
  <rect x="262" y="356" width="332" height="232" rx="22" fill="#000000" opacity="0.05" stroke="#f4efdc" stroke-width="1" stroke-dasharray="8 10"/>
  <text x="318" y="478" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc" opacity="0.45">protected center</text>
  <text x="318" y="512" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc" opacity="0.45">view cone</text>
  <text x="796" y="248" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Export name</text>
  <text x="796" y="286" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">apt302_hollow_saint_ritual_status_overlay_1600x900.png</text>
  <text x="796" y="352" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Suggested size</text>
  <text x="796" y="390" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">1600 x 900 or 1920 x 1080 with preserved center transparency bias</text>
  <text x="796" y="456" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Opacity guidance</text>
  <text x="796" y="494" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Top and bottom bands can sit around 0.72-0.86, but center treatment</text>
  <text x="796" y="526" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">should stay subtle enough for first-person scene readability.</text>
  <text x="796" y="592" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Usage note</text>
  <text x="796" y="630" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Do not let ritual HUD art collapse into a fullscreen vignette.</text>
  <text x="796" y="662" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Keep clue count, current read, and prompt copy stronger than ornament.</text>
  <rect x="96" y="770" width="1244" height="44" rx="10" fill="#0f100d" stroke="#8f9087" stroke-width="2"/>
  <text x="124" y="799" font-family="Arial, sans-serif" font-size="22" fill="#f4efdc">Carry-forward rule: the player must still be able to inspect the room while this overlay is on screen.</text>
</svg>
