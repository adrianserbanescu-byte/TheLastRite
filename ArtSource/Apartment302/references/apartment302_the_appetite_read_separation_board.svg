<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <rect width="1800" height="1100" fill="#181512"/>
  <text x="70" y="82" font-family="Georgia, serif" font-size="48" fill="#f4ebd7">The Appetite read-separation board</text>
  <text x="70" y="126" font-family="Arial, sans-serif" font-size="24" fill="#d7c6a6">GP-A-P5 focus board: define a feeding-pressure lane that reads domestic and hungry without collapsing into gore or the other demon families.</text>
  <rect x="70" y="178" width="790" height="840" rx="16" fill="#100d0b" stroke="#8d6c37" stroke-width="4"/>
  <rect x="940" y="178" width="790" height="840" rx="16" fill="#100d0b" stroke="#7a6040" stroke-width="4"/>
  <text x="108" y="236" font-family="Georgia, serif" font-size="38" fill="#f4ebd7">Keep this family</text>
  <text x="978" y="236" font-family="Georgia, serif" font-size="38" fill="#f4ebd7">Keep separate from</text>
  <rect x="108" y="278" width="714" height="228" rx="14" fill="#171310" stroke="#8d6c37" stroke-width="3"/>
  <text x="138" y="330" font-family="Arial, sans-serif" font-size="26" fill="#f4ebd7">Feeding rings, bib-and-bowl rhythm, spoon/fork uprights, meal-stain repetition, low hungry crescents.</text>
  <text x="138" y="376" font-family="Arial, sans-serif" font-size="26" fill="#e0d2b8">Primary props: feeding chair, bowl edge, bib cloth, cupboard lip, crumb field, grease halo.</text>
  <text x="138" y="422" font-family="Arial, sans-serif" font-size="26" fill="#e0d2b8">Player read: consumption pressure and domestic hunger ritual, never gore spectacle.</text>
  <rect x="108" y="540" width="714" height="412" rx="14" fill="#171310" stroke="#7a6040" stroke-width="3"/>
  <text x="138" y="592" font-family="Arial, sans-serif" font-size="26" fill="#f4ebd7">Do not absorb Hollow Saint:</text>
  <text x="138" y="638" font-family="Arial, sans-serif" font-size="26" fill="#e0d2b8">avoid pale chalk certainty, broken crown circles, and quiet corroborated nursery halo reads.</text>
  <text x="138" y="708" font-family="Arial, sans-serif" font-size="26" fill="#f4ebd7">Do not absorb Weeping Matron:</text>
  <text x="138" y="754" font-family="Arial, sans-serif" font-size="26" fill="#e0d2b8">avoid damp veil drops, basin-care posture, and curtain-sag grief framing.</text>
  <text x="138" y="836" font-family="Arial, sans-serif" font-size="26" fill="#f4ebd7">Use file:</text>
  <text x="138" y="882" font-family="Arial, sans-serif" font-size="26" fill="#e0d2b8">props/the_appetite_variance_prop_family.svg</text>
  <rect x="978" y="278" width="714" height="674" rx="14" fill="#171310" stroke="#7a6040" stroke-width="3"/>
  <text x="1008" y="330" font-family="Arial, sans-serif" font-size="26" fill="#f4ebd7">Variance guardrail:</text>
  <text x="1008" y="376" font-family="Arial, sans-serif" font-size="26" fill="#e0d2b8">The Appetite should stay meal-coded, repetitive, and domestic. It must not become gore, nor borrow halo or veil family cues.</text>
  <text x="1008" y="458" font-family="Arial, sans-serif" font-size="26" fill="#f4ebd7">Bounded carry-forward:</text>
  <text x="1008" y="504" font-family="Arial, sans-serif" font-size="26" fill="#e0d2b8">Use this board to protect visual separation only. It does not prove final prop density, encounter timing, or runtime implementation.</text>
  <rect x="70" y="1036" width="1660" height="42" rx="10" fill="#0d0a08" stroke="#8d6c37" stroke-width="2"/>
  <text x="98" y="1064" font-family="Arial, sans-serif" font-size="22" fill="#f4ebd7">Rule: if a prop reads like a repeated feeding pressure, it belongs to The Appetite and should not borrow ritual corroboration or grieving-care silhouettes.</text>
</svg>
