  <text x="108" y="944" font-family="Arial, sans-serif" font-size="25" fill="#d8c78d">Use note: true clues should look like pieces of one ritual sentence repeated across nursery prop, paper, sound, and floor mark.</text>
  <text x="978" y="944" font-family="Arial, sans-serif" font-size="25" fill="#c9c0a3">Use note: false leads can be dramatic, but they should not share the full family of crown, halo, ash, and child-facing shapes.</text>
  <rect x="70" y="1000" width="1660" height="54" rx="10" fill="#0e0f0d" stroke="#a98f45" stroke-width="2"/>
  <text x="100" y="1036" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Rule for the vertical slice: evidence coherence beats spectacle. The player should trust the repeated nursery family over the loudest mirror prop.</text>
