  <text x="978" y="236" font-family="Georgia, serif" font-size="42" fill="#f4efdc">Seductive bait lane</text>
  <text x="108" y="276" font-family="Arial, sans-serif" font-size="24" fill="#d8c78d">shared family: halo arc, broken crown, dry ash, restrained gold, child-facing placement</text>
  <text x="978" y="276" font-family="Arial, sans-serif" font-size="24" fill="#c9c0a3">contrast family: pointed diamonds, colder glass, louder polish, no nursery corroboration</text>
