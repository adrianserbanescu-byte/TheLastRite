<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#141310"/>
  <rect x="40" y="40" width="1320" height="820" rx="16" fill="#211e19" stroke="#8f9087" stroke-width="2"/>

  <text x="80" y="105" fill="#f4efdc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Apartment 302 Room-Dressing Pass Order</text>
  <text x="80" y="145" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="18">Laptop 2 sequencing board for a clean Unreal placement pass without gameplay-code drift.</text>

  <rect x="80" y="190" width="820" height="620" rx="12" fill="#2b2822" stroke="#5a584e" stroke-width="2"/>
  <text x="115" y="228" fill="#f4efdc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Pass order</text>

  <rect x="120" y="275" width="740" height="108" rx="12" fill="#5a5447" stroke="#e8e2d3" stroke-width="3"/>
  <circle cx="170" cy="329" r="28" fill="#e8e2d3"/>
  <text x="160" y="338" fill="#1a1916" font-family="Arial, sans-serif" font-size="24" font-weight="700">1</text>
  <text x="220" y="320" fill="#f4efdc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Build the nursery clue cluster first</text>
  <text x="220" y="350" fill="#f4efdc" font-family="Arial, sans-serif" font-size="16">cradle halo, prayer cards, baby monitor, and the nursery sigil should read as one evidence family</text>

  <rect x="120" y="408" width="740" height="108" rx="12" fill="#6f6547" stroke="#f4efdc" stroke-width="3"/>
  <circle cx="170" cy="462" r="28" fill="#a98f45"/>
  <text x="160" y="471" fill="#1a1916" font-family="Arial, sans-serif" font-size="24" font-weight="700">2</text>
  <text x="220" y="453" fill="#f4efdc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Keep the correct ritual anchor inside that clue language</text>
  <text x="220" y="483" fill="#f4efdc" font-family="Arial, sans-serif" font-size="16">the nursery sigil should feel like the answer before any UI or prompt help arrives</text>

  <rect x="120" y="541" width="740" height="108" rx="12" fill="#434850" stroke="#71817d" stroke-width="3"/>
  <circle cx="170" cy="595" r="28" fill="#71817d"/>
  <text x="160" y="604" fill="#1a1916" font-family="Arial, sans-serif" font-size="24" font-weight="700">3</text>
  <text x="220" y="586" fill="#f4efdc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Add false leads only after the true read is stable</text>
  <text x="220" y="616" fill="#f4efdc" font-family="Arial, sans-serif" font-size="16">window latch, pawn-ticket pouch, and mirror trap should distract without becoming the main focal path</text>

  <rect x="120" y="674" width="740" height="108" rx="12" fill="#3a352d" stroke="#8f9087" stroke-width="3"/>
  <circle cx="170" cy="728" r="28" fill="#8f9087"/>
  <text x="160" y="737" fill="#1a1916" font-family="Arial, sans-serif" font-size="24" font-weight="700">4</text>
  <text x="220" y="719" fill="#f4efdc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Tune lighting last to protect the read</text>
  <text x="220" y="749" fill="#f4efdc" font-family="Arial, sans-serif" font-size="16">entry practicals and pale clue accents should support sightlines instead of competing with the mirror trap</text>

  <path d="M820 383 C840 395, 840 405, 820 418" fill="none" stroke="#d6d0c0" stroke-width="4" stroke-linecap="round"/>
  <path d="M820 516 C840 528, 840 538, 820 551" fill="none" stroke="#d6d0c0" stroke-width="4" stroke-linecap="round"/>
  <path d="M820 649 C840 661, 840 671, 820 684" fill="none" stroke="#d6d0c0" stroke-width="4" stroke-linecap="round"/>

  <rect x="940" y="190" width="370" height="620" rx="12" fill="#282520" stroke="#5a584e" stroke-width="2"/>
  <text x="975" y="228" fill="#f4efdc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Laptop 2 guardrails</text>

  <rect x="975" y="270" width="300" height="120" rx="10" fill="#342f28"/>
  <text x="995" y="304" fill="#f4efdc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Safe to own here</text>
  <text x="995" y="330" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- clue clustering</text>
  <text x="995" y="354" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- ritual-anchor readability</text>
  <text x="995" y="378" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- lighting hierarchy and false-lead spacing</text>

  <rect x="975" y="425" width="300" height="132" rx="10" fill="#342f28"/>
  <text x="995" y="459" fill="#f4efdc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Do not drift into</text>
  <text x="995" y="485" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- clue logic changes</text>
  <text x="995" y="509" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- ritual selection behavior</text>
  <text x="995" y="533" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- inspect prompt or interaction-range tuning</text>

  <rect x="975" y="592" width="300" height="158" rx="10" fill="#342f28"/>
  <text x="995" y="626" fill="#f4efdc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Done when</text>
  <text x="995" y="652" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- nursery side reads first from entry</text>
  <text x="995" y="676" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- mirror trap tempts without dominating</text>
  <text x="995" y="700" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- true clues stay pale and legible</text>
  <text x="995" y="724" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">- branch scope stays inside packaging/content</text>
</svg>
