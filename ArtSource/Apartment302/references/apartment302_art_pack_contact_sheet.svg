<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1d1d19"/>
      <stop offset="1" stop-color="#10110e"/>
    </linearGradient>
  </defs>
  <rect width="1800" height="1320" fill="url(#bg)"/>

  <text x="72" y="86" font-family="Georgia, serif" font-size="50" fill="#f4efdc">Apartment 302 art pack contact sheet</text>
  <text x="72" y="128" font-family="Arial, sans-serif" font-size="24" fill="#c9c0a3">A8 quick-find audit: browse the accepted A1-A7 pack by asset family, likely usage, and carry-forward risk before any later export or implementation pass.</text>

  <rect x="72" y="164" width="1656" height="86" rx="16" fill="#0f100d" stroke="#a98f45" stroke-width="3"/>
  <rect x="104" y="190" width="22" height="22" rx="6" fill="#efe7c8"/>
  <text x="140" y="208" font-family="Arial, sans-serif" font-size="22" fill="#f4efdc">corroborated clue-family support</text>
  <rect x="500" y="190" width="22" height="22" rx="6" fill="#54615d"/>
  <text x="536" y="208" font-family="Arial, sans-serif" font-size="22" fill="#f4efdc">bait or false-lead support</text>
  <rect x="876" y="190" width="22" height="22" rx="6" fill="#d8c78d"/>
  <text x="912" y="208" font-family="Arial, sans-serif" font-size="22" fill="#f4efdc">UI support or variant</text>
  <rect x="1222" y="190" width="22" height="22" rx="6" fill="#8f9087"/>
  <text x="1258" y="208" font-family="Arial, sans-serif" font-size="22" fill="#f4efdc">carry-forward guidance only</text>

  <rect x="72" y="282" width="804" height="420" rx="16" fill="#11120f" stroke="#a98f45" stroke-width="4"/>
  <text x="108" y="338" font-family="Georgia, serif" font-size="38" fill="#f4efdc">Corroborated nursery chain</text>
  <text x="108" y="378" font-family="Arial, sans-serif" font-size="22" fill="#d8c78d">Use when later work needs the true Hollow Saint evidence family and the player should feel repeated confirmation, not noise.</text>
  <rect x="112" y="412" width="18" height="18" rx="5" fill="#efe7c8"/>
  <text x="146" y="428" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Core ritual and corroboration props</text>
  <text x="146" y="460" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`props/nursery_sigil_correct_ritual.svg`, `props/prayer_cards_crown_circle.svg`</text>
  <text x="146" y="490" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">Likely usage: ritual anchor, corroborating close-read prop, motif benchmark.</text>
  <text x="146" y="520" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: do not over-clean chalk breakup or remove the child-facing halo/crown rhythm.</text>
  <rect x="112" y="560" width="18" height="18" rx="5" fill="#efe7c8"/>
  <text x="146" y="576" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Language and comparison board</text>
  <text x="146" y="608" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`references/hollow_saint_clue_language_board.svg`</text>
  <text x="146" y="638" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">Likely usage: first reference check when a later pass needs to preserve the true-versus-bait sentence.</text>
  <text x="146" y="668" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: later polish can accidentally equalize the bait lane if this comparison sheet is skipped.</text>

  <rect x="924" y="282" width="804" height="420" rx="16" fill="#11120f" stroke="#8f9087" stroke-width="4"/>
  <text x="960" y="338" font-family="Georgia, serif" font-size="38" fill="#f4efdc">Bait and false-lead lane</text>
  <text x="960" y="378" font-family="Arial, sans-serif" font-size="22" fill="#d8c78d">Use when later work needs tempting spectacle or mundane misread support without creating a second correct route.</text>
  <rect x="964" y="412" width="18" height="18" rx="5" fill="#54615d"/>
  <text x="998" y="428" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Mirror-bait ritual anchor</text>
  <text x="998" y="460" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`props/mirror_circle_wrong_ritual.svg`</text>
  <text x="998" y="490" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">Likely usage: tempting wrong ritual read, spectacle route, contrast point against nursery evidence.</text>
  <text x="998" y="520" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: lighting and polish can make this feel validated if glass-green and symmetry out-rank the nursery lane.</text>
  <rect x="964" y="560" width="18" height="18" rx="5" fill="#54615d"/>
  <text x="998" y="576" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Mundane false-lead props and board</text>
  <text x="998" y="608" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`props/broken_window_latch_false_lead.svg`, `props/pawn_ticket_pouch_false_lead.svg`</text>
  <text x="998" y="638" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`references/apartment302_false_lead_dressing_board.svg`</text>
  <text x="998" y="668" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: arranging these too neatly can accidentally turn domestic stress into ritual corroboration.</text>

  <rect x="72" y="736" width="804" height="512" rx="16" fill="#11120f" stroke="#a98f45" stroke-width="4"/>
  <text x="108" y="792" font-family="Georgia, serif" font-size="38" fill="#f4efdc">UI support and variant family</text>
  <text x="108" y="832" font-family="Arial, sans-serif" font-size="22" fill="#d8c78d">Use when later work needs clue-note or ritual-status support art that keeps text safe and the center view readable.</text>
  <rect x="112" y="866" width="18" height="18" rx="5" fill="#d8c78d"/>
  <text x="146" y="882" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Base UI-support set</text>
  <text x="146" y="914" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`ui/hollow_saint_clue_note_overlay.svg`, `ui/hollow_saint_ritual_status_overlay.svg`</text>
  <text x="146" y="944" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">Likely usage: main source reference before export-safe tuning or runtime adaptation.</text>
  <text x="146" y="974" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: ornament can creep inward and steal hierarchy from gameplay text or the play cone.</text>
  <rect x="112" y="1014" width="18" height="18" rx="5" fill="#d8c78d"/>
  <text x="146" y="1030" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Scene-value variants and selection sheet</text>
  <text x="146" y="1062" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`ui/hollow_saint_clue_note_overlay_light_variant.svg`, `ui/hollow_saint_clue_note_overlay_dark_variant.svg`</text>
  <text x="146" y="1092" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`ui/hollow_saint_ritual_status_overlay_light_variant.svg`, `ui/hollow_saint_ritual_status_overlay_dark_variant.svg`</text>
  <text x="146" y="1122" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`references/apartment302_ui_variant_selection_board.svg`</text>
  <text x="146" y="1152" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: choosing the darkest variant by default can solve contrast while crushing the room hierarchy.</text>

  <rect x="924" y="736" width="804" height="512" rx="16" fill="#11120f" stroke="#8f9087" stroke-width="4"/>
  <text x="960" y="792" font-family="Georgia, serif" font-size="38" fill="#f4efdc">Carry-forward packs and prep sheets</text>
  <text x="960" y="832" font-family="Arial, sans-serif" font-size="22" fill="#d8c78d">Use these when later work needs the right reference first, rather than guessing which source set to export, port, or reinterpret.</text>
  <rect x="964" y="866" width="18" height="18" rx="5" fill="#8f9087"/>
  <text x="998" y="882" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Integration and overview boards</text>
  <text x="998" y="914" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`references/apartment302_integration_reference_pack.svg`</text>
  <text x="998" y="944" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`references/apartment302_export_prep_board.svg`, `references/apartment302_material_decal_prep_board.svg`</text>
  <text x="998" y="974" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: later teams can waste time rebuilding rules that already exist if these are skipped.</text>
  <rect x="964" y="1014" width="18" height="18" rx="5" fill="#8f9087"/>
  <text x="998" y="1030" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Export and material prep cards</text>
  <text x="998" y="1062" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`exports/*.svg` A5 cards and `exports/ui_variant_export_usage_cards.svg`</text>
  <text x="998" y="1092" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">`materials/*_prep.svg` A6 sheets</text>
  <text x="998" y="1122" font-family="Arial, sans-serif" font-size="21" fill="#c9c0a3">Likely usage: naming, export-size, opacity, decal breakup, and surface-language checks.</text>
  <text x="998" y="1152" font-family="Arial, sans-serif" font-size="21" fill="#f4efdc">Carry-forward risk: treating these as final shipped assets instead of prep guidance can hide unresolved runtime contrast and scale checks.</text>

  <rect x="72" y="1272" width="1656" height="24" rx="8" fill="#0d0e0b" stroke="#a98f45" stroke-width="2"/>
  <text x="104" y="1290" font-family="Arial, sans-serif" font-size="20" fill="#f4efdc">Quick-use rule: start with this sheet, then open the matching family board before exporting, dressing, or adapting anything from the Apartment 302 pack.</text>
</svg>
