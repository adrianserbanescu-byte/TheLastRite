  <circle cx="930" cy="285" r="14" fill="#e8e2d3"/>
  <text x="960" y="292" fill="#f4efdc" font-family="Arial, sans-serif" font-size="18">Player should read the nursery clue cluster first.</text>

  <circle cx="930" cy="335" r="14" fill="#a98f45"/>
  <text x="960" y="342" fill="#f4efdc" font-family="Arial, sans-serif" font-size="18">Correct ritual anchor stays near the true clue language.</text>

  <circle cx="930" cy="385" r="14" fill="#71817d"/>
  <text x="960" y="392" fill="#f4efdc" font-family="Arial, sans-serif" font-size="18">Wrong ritual anchor should be visible but colder and less domestic.</text>

  <circle cx="930" cy="435" r="14" fill="#8f9087"/>
  <text x="960" y="442" fill="#f4efdc" font-family="Arial, sans-serif" font-size="18">False leads belong on the scan path, not on the final anchor path.</text>

  <rect x="915" y="490" width="355" height="96" rx="10" fill="#342f28"/>
  <text x="935" y="522" fill="#f4efdc" font-family="Arial, sans-serif" font-size="20" font-weight="700">First 20-second sweep</text>
  <text x="935" y="548" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">1. entry quiet  2. nursery clue cluster  3. correct sigil read</text>
  <text x="935" y="572" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">False leads should interrupt, not replace, that route.</text>

  <rect x="915" y="620" width="355" height="130" rx="10" fill="#342f28"/>
  <text x="935" y="652" fill="#f4efdc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Laptop 2 handoff note</text>
  <text x="935" y="678" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">Use this board when placing exported props and decal cues.</text>
  <text x="935" y="702" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">Protect sightlines to the nursery cluster and the correct sigil.</text>
  <text x="935" y="726" fill="#d6d0c0" font-family="Arial, sans-serif" font-size="16">Avoid pushing the mirror trap closer to the entry than the true clues.</text>
</svg>
