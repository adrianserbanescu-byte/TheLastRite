  <text x="325" y="402" fill="#f4efdc" font-family="Arial, sans-serif" font-size="16">baby monitor hymn</text>
  <text x="325" y="426" fill="#f4efdc" font-family="Arial, sans-serif" font-size="16">prayer cards crown circle</text>
  <text x="325" y="450" fill="#a98f45" font-family="Arial, sans-serif" font-size="16">first strong Hollow Saint read</text>

  <circle cx="590" cy="380" r="78" fill="#6f6547" stroke="#e8e2d3" stroke-width="4"/>
  <circle cx="590" cy="380" r="54" fill="none" stroke="#f4efdc" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="540" y="372" fill="#f4efdc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Correct</text>
  <text x="520" y="398" fill="#f4efdc" font-family="Arial, sans-serif" font-size="20" font-weight="700">nursery sigil</text>
  <text x="520" y="422" fill="#a98f45" font-family="Arial, sans-serif" font-size="16">keep visible from clue cluster</text>

  <circle cx="680" cy="612" r="72" fill="#353944" stroke="#71817d" stroke-width="4"/>
  <circle cx="680" cy="612" r="48" fill="none" stroke="#8f9087" stroke-width="3" stroke-dasharray="8 8"/>
