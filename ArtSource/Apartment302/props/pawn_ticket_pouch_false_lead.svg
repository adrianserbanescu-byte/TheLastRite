  <text x="104" y="822" font-family="Arial, sans-serif" font-size="28" fill="#f4efdc">Intended usage: dress a side surface or bag drop so players briefly consider debt, desperation, or neglect before evidence coherence pulls them back to the nursery lane.</text>
