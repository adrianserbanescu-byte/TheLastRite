<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="table" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b2722"/>
      <stop offset="1" stop-color="#171512"/>
    </linearGradient>
    <linearGradient id="cardPaper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f3ebcf"/>
      <stop offset="1" stop-color="#d8c78d"/>
    </linearGradient>
    <g id="motif">
      <path d="M-34 24 C-20 -4 -8 -16 0 -20 C8 -16 20 -4 34 24" fill="none" stroke="#e8e2d3" stroke-width="5" stroke-linecap="round"/>
      <path d="M-24 18 L-12 -8 L0 10 L12 -8 L24 18" fill="none" stroke="#a98f45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="0" cy="16" r="10" fill="none" stroke="#a98f45" stroke-width="4"/>
      <path d="M-12 44 C-6 30 0 24 4 16 C10 24 16 30 18 44" fill="#8f9087" opacity="0.74"/>
    </g>
    <g id="card">
      <rect x="-54" y="-88" width="108" height="176" rx="8" fill="url(#cardPaper)" stroke="#f4efdc" stroke-width="3"/>
      <rect x="-42" y="-72" width="84" height="144" rx="6" fill="#efe7c8" opacity="0.92"/>
      <path d="M-34 -50 C-20 -68 -8 -74 0 -74 C8 -74 20 -68 34 -50" fill="none" stroke="#c9c0a3" stroke-width="3" opacity="0.8"/>
      <use href="#motif" transform="translate(0 -10)"/>
      <path d="M-26 62 L26 62" stroke="#8f9087" stroke-width="4"/>
    </g>
  </defs>
  <rect width="1400" height="900" fill="url(#table)"/>
  <g opacity="0.18" fill="#8f9087">
    <circle cx="226" cy="198" r="52"/>
    <circle cx="1180" cy="746" r="44"/>
    <circle cx="1034" cy="240" r="26"/>
  </g>
  <text x="72" y="86" font-family="Georgia, serif" font-size="42" fill="#f4efdc">Prayer-card crown circle</text>
  <text x="72" y="128" font-family="Arial, sans-serif" font-size="24" fill="#c9c0a3">Refresh goal: make the card arrangement feel like the same Hollow Saint family as the nursery sigil, not a separate prop gimmick.</text>
  <g transform="translate(700 470)">
    <circle cx="0" cy="0" r="278" fill="none" stroke="#a98f45" stroke-width="5" stroke-dasharray="5 18"/>
    <circle cx="0" cy="0" r="204" fill="none" stroke="#e8e2d3" stroke-width="4" stroke-dasharray="14 16" opacity="0.62"/>
    <use href="#card" transform="rotate(0) translate(0 -290)"/>
    <use href="#card" transform="rotate(40) translate(0 -290) rotate(-40)"/>
    <use href="#card" transform="rotate(80) translate(0 -290) rotate(-80)"/>
    <use href="#card" transform="rotate(120) translate(0 -290) rotate(-120)"/>
    <use href="#card" transform="rotate(160) translate(0 -290) rotate(-160)"/>
    <use href="#card" transform="rotate(200) translate(0 -290) rotate(-200)"/>
    <use href="#card" transform="rotate(240) translate(0 -290) rotate(-240)"/>
    <use href="#card" transform="rotate(280) translate(0 -290) rotate(-280)"/>
    <use href="#card" transform="rotate(320) translate(0 -290) rotate(-320)"/>
    <path d="M-164 -112 C-108 -182 -40 -218 0 -226 C40 -218 108 -182 164 -112" fill="none" stroke="#e8e2d3" stroke-width="7"/>
    <path d="M-118 -88 L-66 -184 L-4 -86 L58 -184 L118 -88" fill="none" stroke="#a98f45" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="-46" r="44" fill="none" stroke="#a98f45" stroke-width="7"/>
    <path d="M-54 78 C-28 26 -8 10 0 -4 C10 10 30 26 54 78" fill="#8f9087" opacity="0.72"/>
    <path d="M-122 146 C-56 102 56 102 122 146" fill="none" stroke="#e8e2d3" stroke-width="6"/>
  </g>
  <g transform="translate(1044 312)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="26" fill="#f4efdc">Read as corroborating clue</text>
    <text x="0" y="42" font-family="Arial, sans-serif" font-size="22" fill="#d8c78d">same broken crown and halo arc as the nursery mark</text>
    <text x="0" y="78" font-family="Arial, sans-serif" font-size="22" fill="#d8c78d">paper icon repeats the clue family on harmless domestic objects</text>
    <text x="0" y="114" font-family="Arial, sans-serif" font-size="22" fill="#d8c78d">a neat ritual arrangement, but still child-facing and quiet</text>
  </g>
  <rect x="72" y="772" width="1256" height="78" rx="12" fill="#12110f" stroke="#a98f45" stroke-width="3"/>
  <text x="104" y="820" font-family="Arial, sans-serif" font-size="28" fill="#f4efdc">Intended usage: place near the nursery chain so players learn that the crown-circle motif is evidence, not just decorative sacrilege.</text>
</svg>
