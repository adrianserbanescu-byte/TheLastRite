  <g transform="translate(600 406)">
    <g id="card"><rect x="-48" y="-82" width="96" height="164" rx="6" fill="#d8c78d" stroke="#f4efdc" stroke-width="3"/><rect x="-35" y="-64" width="70" height="116" rx="5" fill="#efe7c8"/><circle cx="0" cy="-26" r="18" fill="none" stroke="#a98f45" stroke-width="5"/><path d="M-20 24 Q0 4 20 24" fill="none" stroke="#8f9087" stroke-width="4"/><path d="M-20 48 L20 48" stroke="#8f9087" stroke-width="4"/></g>
    <use href="#card" transform="rotate(0) translate(0 -240)"/><use href="#card" transform="rotate(45) translate(0 -240) rotate(-45)"/><use href="#card" transform="rotate(90) translate(0 -240) rotate(-90)"/><use href="#card" transform="rotate(135) translate(0 -240) rotate(-135)"/><use href="#card" transform="rotate(180) translate(0 -240) rotate(-180)"/><use href="#card" transform="rotate(225) translate(0 -240) rotate(-225)"/><use href="#card" transform="rotate(270) translate(0 -240) rotate(-270)"/><use href="#card" transform="rotate(315) translate(0 -240) rotate(-315)"/>
  </g>
  <path d="M468 298 L504 244 L540 298 M660 298 L696 244 L732 298" fill="none" stroke="#a98f45" stroke-width="7"/>
