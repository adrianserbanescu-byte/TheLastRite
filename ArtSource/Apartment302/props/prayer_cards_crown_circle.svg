  <rect width="1200" height="800" fill="#1f211d"/>
  <text x="72" y="78" font-family="Georgia, serif" font-size="40" fill="#f4efdc">Prayer cards arranged into crown/circle</text>
  <text x="72" y="124" font-family="Arial, sans-serif" font-size="22" fill="#c9c0a3">True clue: invented cards make a crown ring without copying real sacred symbols.</text>
