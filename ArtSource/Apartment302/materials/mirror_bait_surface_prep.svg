  <text x="760" y="240" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Carry-forward notes</text>
  <text x="760" y="286" font-family="Arial, sans-serif" font-size="23" fill="#f4efdc">Glass-green and cooler grays should lead the surface read.</text>
  <text x="760" y="326" font-family="Arial, sans-serif" font-size="23" fill="#f4efdc">Pointed shard geometry should stay cleaner than the nursery chalk.</text>
  <text x="760" y="366" font-family="Arial, sans-serif" font-size="23" fill="#f4efdc">Use polish and reflection to win attention briefly.</text>
  <text x="760" y="406" font-family="Arial, sans-serif" font-size="23" fill="#f4efdc">Do not add ash handprints, dry powder, or child-object echo.</text>
  <text x="760" y="474" font-family="Arial, sans-serif" font-size="26" fill="#d8c78d">Material risk</text>
  <text x="760" y="520" font-family="Arial, sans-serif" font-size="23" fill="#f4efdc">Too much contrast or too much gold makes this feel equally validated.</text>
  <text x="760" y="552" font-family="Arial, sans-serif" font-size="23" fill="#f4efdc">Keep it colder, cleaner, and narratively isolated.</text>
  <rect x="72" y="830" width="1256" height="40" rx="10" fill="#0f100d" stroke="#8f9087" stroke-width="2"/>
  <text x="100" y="857" font-family="Arial, sans-serif" font-size="22" fill="#f4efdc">Runtime read target: seductive spectacle that loses the evidence argument.</text>
