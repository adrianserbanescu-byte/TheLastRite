<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#171612"/>
  <text x="72" y="76" font-family="Georgia, serif" font-size="46" fill="#f4efdc">Ritual-status overlay dark variant</text>
  <text x="72" y="118" font-family="Arial, sans-serif" font-size="23" fill="#c9c0a3">Export-safe HUD support for brighter rooms where the status bands need firmer contrast.</text>
  <g transform="translate(84 176)">
    <rect width="1432" height="116" rx="18" fill="#0e0f0d" opacity="0.9" stroke="#8f9087" stroke-width="3"/>
    <text x="28" y="40" font-family="Arial, sans-serif" font-size="24" fill="#a98f45">DARK STATUS BAND</text>
    <text x="28" y="82" font-family="Arial, sans-serif" font-size="34" fill="#f4efdc">Use when bright rooms or UI effects would wash out the lighter status variant.</text>
  </g>
  <g transform="translate(84 696)">
    <rect width="1432" height="120" rx="18" fill="#0e0f0d" opacity="0.92" stroke="#8f9087" stroke-width="3"/>
    <path d="M52 60 H820" stroke="#35312a" stroke-width="18" stroke-linecap="round"/>
    <path d="M52 60 H648" stroke="#a98f45" stroke-width="18" stroke-linecap="round"/>
    <text x="52" y="102" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Use only where stronger band contrast is needed, and keep the center open.</text>
  </g>
  <rect x="528" y="272" width="544" height="316" rx="28" fill="#000000" opacity="0.02" stroke="#f4efdc" stroke-width="1" stroke-dasharray="10 12"/>
  <text x="606" y="446" font-family="Arial, sans-serif" font-size="28" fill="#f4efdc" opacity="0.42">center cone still protected</text>
</svg>
