<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#171612"/>
  <text x="72" y="76" font-family="Georgia, serif" font-size="46" fill="#f4efdc">Ritual-status overlay light variant</text>
  <text x="72" y="118" font-family="Arial, sans-serif" font-size="23" fill="#c9c0a3">Export-safe HUD support for darker rooms where top-and-bottom bands need gentler density.</text>
  <g transform="translate(84 176)">
    <rect width="1432" height="112" rx="18" fill="#11120f" opacity="0.7" stroke="#a98f45" stroke-width="3"/>
    <text x="28" y="40" font-family="Arial, sans-serif" font-size="24" fill="#a98f45">LIGHT STATUS BAND</text>
    <text x="28" y="82" font-family="Arial, sans-serif" font-size="34" fill="#f4efdc">Use when the scene is dark enough that heavy bands would choke readability.</text>
  </g>
  <g transform="translate(84 700)">
    <rect width="1432" height="116" rx="18" fill="#11120f" opacity="0.72" stroke="#a98f45" stroke-width="3"/>
    <path d="M52 58 H820" stroke="#3b352d" stroke-width="16" stroke-linecap="round"/>
    <path d="M52 58 H648" stroke="#d8c78d" stroke-width="16" stroke-linecap="round"/>
    <text x="52" y="98" font-family="Arial, sans-serif" font-size="24" fill="#f4efdc">Keep center visibility favored over ritual atmosphere.</text>
  </g>
  <rect x="520" y="270" width="560" height="320" rx="28" fill="#000000" opacity="0.03" stroke="#f4efdc" stroke-width="1" stroke-dasharray="10 12"/>
  <text x="598" y="446" font-family="Arial, sans-serif" font-size="28" fill="#f4efdc" opacity="0.44">center view cone stays open</text>
</svg>
