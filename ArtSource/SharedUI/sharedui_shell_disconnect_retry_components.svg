  <text x="126" y="303" fill="#ece4d0" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">disconnect banner</text>

  <rect x="468" y="248" width="252" height="88" rx="44" fill="#2a332f" stroke="#63726c" stroke-width="2"/>
  <text x="528" y="303" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">recover</text>

