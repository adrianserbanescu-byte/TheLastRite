  <text x="126" y="449" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">disconnect / retry strip</text>

  <rect x="688" y="396" width="360" height="94" rx="18" fill="#25221e" stroke="#958246" stroke-width="2"/>
