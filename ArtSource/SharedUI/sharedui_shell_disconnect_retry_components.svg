  <text x="96" y="768" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Use this sheet to keep GP-A11 interruption states visually consistent across disconnect, unavailable-service, and retry-later shell surfaces.</text>
  <text x="96" y="804" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">These are source-art components only. Runtime reconnect logic, outage timing, and service recovery behavior still belong to later implementation work.</text>
