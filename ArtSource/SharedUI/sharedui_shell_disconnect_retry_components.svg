  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="26" y="26" width="1548" height="928" rx="24" fill="#181714" stroke="#958246" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Shared Shell Disconnect + Retry Components</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Carry-forward component sheet for GP-A11 disconnect-state, unavailable-service, and retry-later shell surfaces</text>

  <rect x="64" y="162" width="1472" height="744" rx="22" fill="#1c1a17" stroke="#63726c" stroke-width="2"/>
