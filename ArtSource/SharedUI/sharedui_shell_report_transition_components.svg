<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#11100d"/>
  <rect x="26" y="26" width="1548" height="928" rx="24" fill="#181714" stroke="#968347" stroke-width="3"/>
  <text x="64" y="90" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Shared Report + Transition Components</text>
  <text x="64" y="124" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="20">Second-pass shell UI support for reports, progress, loading, failure, and retry surfaces</text>

  <rect x="64" y="170" width="1472" height="730" rx="22" fill="#1c1a17" stroke="#687770" stroke-width="2"/>
  <text x="98" y="222" fill="#efe7d4" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Component Set</text>
  <rect x="98" y="258" width="410" height="86" rx="16" fill="#25211d" stroke="#968347" stroke-width="2"/>
  <text x="128" y="313" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">report title bar</text>
  <rect x="550" y="258" width="360" height="70" rx="14" fill="#23211d" stroke="#687770" stroke-width="2"/>
  <rect x="560" y="268" width="210" height="50" rx="10" fill="#d2bc7b"/>
  <text x="586" y="300" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">progress strip</text>
  <rect x="950" y="258" width="220" height="70" rx="35" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="1004" y="302" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">loading</text>
  <rect x="1210" y="258" width="220" height="70" rx="35" fill="#2a2722" stroke="#968347" stroke-width="2"/>
  <text x="1268" y="302" fill="#ead8a4" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">retry</text>

  <rect x="98" y="404" width="360" height="110" rx="18" fill="#25211d" stroke="#687770" stroke-width="2"/>
  <text x="128" y="472" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">state banner</text>
  <rect x="498" y="404" width="360" height="110" rx="18" fill="#25211d" stroke="#968347" stroke-width="2"/>
  <text x="528" y="472" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">verdict chip</text>
  <rect x="898" y="404" width="360" height="110" rx="18" fill="#25211d" stroke="#687770" stroke-width="2"/>
  <text x="928" y="472" fill="#ece4d1" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">transition note</text>
  <rect x="1298" y="404" width="180" height="110" rx="55" fill="#2a332f" stroke="#687770" stroke-width="2"/>
  <text x="1338" y="472" fill="#dde5de" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">next</text>

  <text x="98" y="608" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Use for report/readiness/transition surfaces that need stronger reusable state language than the baseline GP-A1 card set.</text>
  <text x="98" y="646" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep the shell calm, administrative, and readable. These parts should support state changes without turning every transition into a spectacle surface.</text>
  <text x="98" y="704" fill="#d8d0be" font-family="Arial, Helvetica, sans-serif" font-size="21">Boundary</text>
  <text x="98" y="742" fill="#b8b09f" font-family="Arial, Helvetica, sans-serif" font-size="18">Still source-art-only. Later implementation owns pacing, focus order, motion, and final contrast validation.</text>
</svg>
