<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <rect width="1600" height="1080" fill="#11100d"/>
  <rect x="28" y="28" width="1544" height="1024" rx="24" fill="#181714" stroke="#927f45" stroke-width="3"/>
  <text x="64" y="88" fill="#efe7d6" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Shared UI Shell Motif Kit</text>
  <text x="64" y="120" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="20">Reusable shell-facing accent language for future title, board, briefing, and report surfaces</text>

  <rect x="64" y="162" width="456" height="282" rx="22" fill="#1e1c18" stroke="#67766e" stroke-width="2"/>
  <text x="96" y="210" fill="#efe7d6" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Palette Chips</text>
  <rect x="96" y="238" width="90" height="90" rx="12" fill="#ece4d2"/>
  <rect x="202" y="238" width="90" height="90" rx="12" fill="#d2bc7b"/>
  <rect x="308" y="238" width="90" height="90" rx="12" fill="#707d77"/>
  <rect x="414" y="238" width="90" height="90" rx="12" fill="#27241f"/>
  <text x="98" y="356" fill="#c8c1b2" font-family="Arial, Helvetica, sans-serif" font-size="16">paper ash</text>
  <text x="205" y="356" fill="#c8c1b2" font-family="Arial, Helvetica, sans-serif" font-size="16">old gold</text>
  <text x="309" y="356" fill="#c8c1b2" font-family="Arial, Helvetica, sans-serif" font-size="16">ward green</text>
  <text x="415" y="356" fill="#c8c1b2" font-family="Arial, Helvetica, sans-serif" font-size="16">paper black</text>
  <text x="96" y="401" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="18">Use the gold as a state accent, not a flood fill.</text>

  <rect x="548" y="162" width="472" height="282" rx="22" fill="#1e1c18" stroke="#927f45" stroke-width="2"/>
  <text x="580" y="210" fill="#efe7d6" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Type Direction</text>
  <text x="580" y="265" fill="#ece4d2" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" letter-spacing="3">CASE ACTIVE</text>
  <text x="580" y="321" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="23">Condensed uppercase for headers and verdicts</text>
  <text x="580" y="367" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="18">Body copy should stay plain, calm, and easy to scan at distance.</text>
  <text x="580" y="395" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="18">Accent labels can use small-caps or stamped-token styling, but avoid faux-horror distortion.</text>

  <rect x="1048" y="162" width="476" height="282" rx="22" fill="#1e1c18" stroke="#67766e" stroke-width="2"/>
  <text x="1080" y="210" fill="#efe7d6" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Motif Tokens</text>
  <circle cx="1134" cy="280" r="34" fill="none" stroke="#d7c180" stroke-width="6"/>
  <circle cx="1134" cy="280" r="18" fill="none" stroke="#ece4d2" stroke-width="3"/>
  <rect x="1188" y="246" width="118" height="68" rx="34" fill="#292722" stroke="#927f45" stroke-width="2"/>
  <text x="1216" y="288" fill="#ead9ad" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">ritual seal</text>
  <rect x="1324" y="246" width="148" height="68" rx="12" fill="#20231f" stroke="#67766e" stroke-width="2"/>
  <text x="1350" y="288" fill="#dce5de" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">board label</text>
  <text x="1080" y="362" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="18">Abstract circles, tabs, bars, and stamps are safe.</text>
  <text x="1080" y="390" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="18">Direct clue props and nursery objects are not.</text>

  <rect x="64" y="484" width="710" height="520" rx="22" fill="#1d1b17" stroke="#927f45" stroke-width="2"/>
  <text x="96" y="532" fill="#efe7d6" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Shared Components</text>

  <rect x="96" y="566" width="248" height="78" rx="14" fill="#ece4d2" stroke="#927f45" stroke-width="2"/>
  <text x="120" y="612" fill="#24211d" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">briefing paper</text>

  <rect x="372" y="566" width="180" height="78" rx="39" fill="#2a352f" stroke="#67766e" stroke-width="2"/>
  <text x="414" y="612" fill="#dde6df" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">ready</text>

  <rect x="580" y="566" width="150" height="78" rx="12" fill="#2a2722" stroke="#927f45" stroke-width="2"/>
  <text x="606" y="612" fill="#e8d59a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">result</text>

  <rect x="96" y="676" width="634" height="54" rx="12" fill="#23211d" stroke="#67766e" stroke-width="2"/>
  <rect x="104" y="684" width="272" height="38" rx="9" fill="#d2bc7b"/>
  <text x="122" y="708" fill="#27231f" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">verdict bar / progress strip</text>

  <rect x="96" y="760" width="220" height="102" rx="16" fill="#25231f" stroke="#927f45" stroke-width="2"/>
  <text x="120" y="800" fill="#ece4d2" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">case tab</text>
  <text x="120" y="833" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="16">for board, briefing, report</text>

  <rect x="344" y="760" width="180" height="102" rx="16" fill="#25231f" stroke="#67766e" stroke-width="2"/>
  <text x="369" y="800" fill="#ece4d2" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">role chip</text>
  <text x="369" y="833" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="16">reader / anchor / guard</text>

  <rect x="552" y="760" width="178" height="102" rx="16" fill="#25231f" stroke="#927f45" stroke-width="2"/>
  <text x="577" y="800" fill="#ece4d2" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">stamp</text>
  <text x="577" y="833" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="16">accepted / failed / sealed</text>

  <text x="96" y="922" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="19">These components should stay chunky, centered, and readable at a glance.</text>
  <text x="96" y="950" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="17">If later shell work needs more complexity, add it through layout logic, not tiny ornament.</text>

  <rect x="806" y="484" width="718" height="520" rx="22" fill="#1d1b17" stroke="#67766e" stroke-width="2"/>
  <text x="838" y="532" fill="#efe7d6" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Boundary / Use Notes</text>
  <text x="838" y="588" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="20">Use for:</text>
  <text x="838" y="618" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="18">title cards, lobby board labels, briefing headers, debrief verdict bars, report tabs</text>
  <text x="838" y="668" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="20">Do not use for:</text>
  <text x="838" y="698" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="18">room clue props, diegetic in-apartment notes, runtime VFX promises, Unreal-ready widget sizing</text>
  <text x="838" y="748" fill="#d7cfbc" font-family="Arial, Helvetica, sans-serif" font-size="20">Main caution:</text>
  <text x="838" y="778" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="18">The shell should frame the case, not out-spectacle it.</text>
  <text x="838" y="806" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="18">If the shell starts looking more haunted than Apartment 302 itself, the pack has drifted.</text>

  <rect x="1178" y="846" width="308" height="112" rx="18" fill="#23211d" stroke="#927f45" stroke-width="2"/>
  <text x="1206" y="892" fill="#ebe0c5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Read target</text>
  <text x="1206" y="926" fill="#b7af9f" font-family="Arial, Helvetica, sans-serif" font-size="17">bureaucratic exorcism wrapper</text>
</svg>
